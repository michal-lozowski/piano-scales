<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keys Scales</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: sans-serif;
      font-size: 14px;
      color: #000;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .stage {
      width: min(1200px, 100%);
    }

    .masthead {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      gap: 0.5rem 1rem;
      margin-bottom: 1.5rem;
      /* room for the circle sticking up above the title */
      padding-top: calc(min(207px, 58vw) - 1.5rem);
    }

    .masthead-left {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .title-row {
      position: relative;
      display: block;
      width: max-content;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
    }

    .readout {
      margin-left: auto;
      text-align: right;
      align-self: flex-end;
      min-height: 2.75em;
    }

    .enharmonic {
      display: inline-flex;
      flex-shrink: 0;
    }

    .enharmonic button {
      font: inherit;
      font-size: 1rem;
      padding: 0.35rem 0.75rem;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      cursor: pointer;
    }

    .enharmonic button + button {
      border-left: none;
    }

    .enharmonic button[aria-pressed="true"] {
      background: #000;
      color: #fff;
    }

    .enharmonic button:disabled {
      color: #bbb;
      border-color: #ccc;
      background: #f5f5f5;
      cursor: default;
    }

    .enharmonic button:disabled[aria-pressed="true"] {
      background: #ddd;
      color: #999;
      border-color: #ccc;
    }

    .scale-name {
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.35;
      min-height: 1.35em;
    }

    .key-sig {
      margin-top: 0.2rem;
      font-size: 0.9rem;
      line-height: 1.4;
      min-height: 1.4em;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
    }

    .mode button {
      font: inherit;
      padding: 0.35rem 0.75rem;
      border: 1px solid #000;
      background: #fff;
      color: #000;
      cursor: pointer;
    }

    .mode button[aria-pressed="true"] {
      background: #000;
      color: #fff;
    }

    .hint {
      font-size: 0.85rem;
      color: #333;
    }

    .circle-wrap {
      position: absolute;
      left: 100%;
      bottom: 0;
      margin-left: 0.15rem;
      line-height: 0;
    }

    .circle-wrap svg {
      width: min(207px, 58vw);
      height: auto;
      display: block;
    }

    .cof-seg {
      fill: #fff;
      stroke: #000;
      stroke-width: 1;
    }

    .cof-seg.active {
      fill: #000;
    }

    .cof-label {
      font-family: sans-serif;
      font-weight: 700;
      fill: #000;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .cof-label.active {
      fill: #fff;
    }

    .cof-ring-label {
      font-family: sans-serif;
      font-size: 9px;
      fill: #666;
      text-anchor: middle;
    }

    .piano-wrap {
      position: relative;
      user-select: none;
      touch-action: none;
      cursor: grab;
      padding-top: 56px;
    }

    .piano-wrap:active { cursor: grabbing; }

    .grid {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: calc(56px + 0.5cm);
      pointer-events: none;
      z-index: 3;
      overflow: visible;
    }

    .grid svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .keyboard {
      position: relative;
      height: 160px;
      display: flex;
      border: 1px solid #000;
      border-top-width: 2px;
    }

    .white-key {
      flex: 1;
      position: relative;
      background: #fff;
      border-right: 1px solid #000;
    }

    .white-key:last-of-type { border-right: none; }

    .white-key.in-scale {
      background: #e8e8e8;
    }

    .black-keys {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;
    }

    .black-key {
      position: absolute;
      top: 0;
      width: var(--bw);
      height: 58%;
      background: #000;
    }

    .black-key.in-scale {
      background: #2a2a2a;
    }

    .scale-labels {
      position: relative;
      height: 1.5em;
      margin-top: 0.4rem;
    }

    .scale-labels span {
      position: absolute;
      top: 0;
      transform: translateX(-50%);
      font-size: 0.75rem;
      line-height: 1.5em;
      white-space: nowrap;
      pointer-events: none;
    }

    .scale-labels .root-note {
      font-weight: 700;
    }

    @media (max-width: 640px) {
      .keyboard { height: 120px; }
      .readout {
        margin-left: 0;
        text-align: left;
        width: 100%;
        order: 3;
      }
      .scale-labels span { font-size: 0.6rem; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="masthead">
      <div class="masthead-left">
        <div class="title-row">
          <h1>Keys Scales</h1>
          <div class="circle-wrap" aria-hidden="true">
            <svg id="circleSvg" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg"></svg>
          </div>
        </div>
        <div class="controls">
          <div class="mode" role="group" aria-label="Scale type">
            <button type="button" id="btnMajor" aria-pressed="true">Major</button>
            <button type="button" id="btnMinor" aria-pressed="false">Minor</button>
          </div>
          <div class="enharmonic" role="group" aria-label="Enharmonic spelling">
            <button type="button" id="btnSharp" aria-pressed="false" disabled>♯</button>
            <button type="button" id="btnFlat" aria-pressed="false" disabled>♭</button>
          </div>
          <p class="hint">Drag or ← →</p>
        </div>
      </div>

      <div class="readout">
        <div class="scale-name" id="scaleName">C major</div>
        <div class="key-sig" id="keySig">no key signature</div>
      </div>
    </div>

    <div class="piano-wrap" id="pianoWrap" tabindex="0" aria-label="Piano with movable scale grid">
      <div class="grid" id="grid" aria-hidden="true">
        <svg id="gridSvg" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="keyboard" id="keyboard">
        <div class="black-keys" id="blackKeys"></div>
      </div>
      <div class="scale-labels" id="scaleLabels" aria-live="polite"></div>
    </div>
  </div>

  <script>
    const OCTAVES = 4;
    // Absolute semitone indices: octave 0 = 0–11, …, octave 3 = 36–47
    const ZONE_START = 12; // C of 2nd octave — leftmost allowed first note
    const ZONE_END = 47;   // B of 4th octave
    const LABEL_H = 16;    // room above the top bar for W/H labels
    const GRID_ABOVE = 56; // overhang above keyboard (includes labels)
    const STEP_Y = 34;     // L-steps sit here — clear of the keyboard
    const GRID_INTO_CM = 0.5; // verticals stop this far into the keyboard

    // Semitone offsets from first tonic through the octave tonic (8 notes)
    const PATTERNS = {
      major: [0, 2, 4, 5, 7, 9, 11, 12],
      minor: [0, 2, 3, 5, 7, 8, 10, 12],
    };

    const NOTE_SHARP = ["C", "C♯", "D", "D♯", "E", "F", "F♯", "G", "G♯", "A", "A♯", "B"];
    const NOTE_FLAT  = ["C", "D♭", "D", "E♭", "E", "F", "G♭", "G", "A♭", "A", "B♭", "B"];

    const WHITE_PC = [0, 2, 4, 5, 7, 9, 11];
    const LETTERS = ["C", "D", "E", "F", "G", "A", "B"];
    const BLACK_META = [
      { pc: 1, after: 0 },
      { pc: 3, after: 1 },
      { pc: 6, after: 3 },
      { pc: 8, after: 4 },
      { pc: 10, after: 5 },
    ];

    const MAJOR_SIG = {
      0: 0, 7: 1, 2: 2, 9: 3, 4: 4, 11: 5, 6: 6, 1: 7,
      5: -1, 10: -2, 3: -3, 8: -4,
    };
    const MAJOR_FLAT_SIG = { 1: -5, 6: -6, 5: -1, 10: -2, 3: -3, 8: -4, 11: -7 };
    const MAJOR_USE_FLATS = new Set([5, 10, 3, 8, 1, 6]);
    const MINOR_USE_FLATS = new Set([2, 7, 0, 5, 10, 3, 8]);
    // Enharmonic pairs where ♯/♭ spelling can be toggled
    const ENHARMONIC_MAJOR = new Set([1, 6, 11]); // C♯/D♭, F♯/G♭, B/C♭
    const ENHARMONIC_MINOR = new Set([8, 3, 10]); // G♯m/A♭m, D♯m/E♭m, A♯m/B♭m

    const SHARP_ORDER = ["F♯", "C♯", "G♯", "D♯", "A♯", "E♯", "B♯"];
    const FLAT_ORDER  = ["B♭", "E♭", "A♭", "D♭", "G♭", "C♭", "F♭"];

    // Circle of fifths (clockwise from C at top). Counterclockwise = fourths.
    const COF_MAJOR_PC = [0, 7, 2, 9, 4, 11, 6, 1, 8, 3, 10, 5];
    // Dual spellings: B/C♭, G♭/F♯, D♭/C♯
    const COF_MAJOR_LABEL = ["C", "G", "D", "A", "E", "B/C♭", "G♭/F♯", "D♭/C♯", "A♭", "E♭", "B♭", "F"];
    const COF_MINOR_LABEL = ["Am", "Em", "Bm", "F♯m", "C♯m", "G♯m", "E♭m", "B♭m", "Fm", "Cm", "Gm", "Dm"];

    let mode = "major";
    /** Absolute index of the first grid note (tonic). Grid only extends right from here. */
    let firstNote = ZONE_START;
    /** User spelling on enharmonic pairs: true = flats, false = sharps */
    let userPreferFlat = false;
    let keyCenters = [];
    let stepWidth = 40;

    const keyboard = document.getElementById("keyboard");
    const blackKeysEl = document.getElementById("blackKeys");
    const gridEl = document.getElementById("grid");
    const gridSvg = document.getElementById("gridSvg");
    const circleSvg = document.getElementById("circleSvg");
    const pianoWrap = document.getElementById("pianoWrap");
    const scaleNameEl = document.getElementById("scaleName");
    const keySigEl = document.getElementById("keySig");
    const scaleLabelsEl = document.getElementById("scaleLabels");
    const btnMajor = document.getElementById("btnMajor");
    const btnMinor = document.getElementById("btnMinor");
    const btnSharp = document.getElementById("btnSharp");
    const btnFlat = document.getElementById("btnFlat");

    function rootPc() {
      return firstNote % 12;
    }

    function canEnharmonicSwitch() {
      const pc = rootPc();
      return mode === "major" ? ENHARMONIC_MAJOR.has(pc) : ENHARMONIC_MINOR.has(pc);
    }

    /** Default spelling for the current key (ignores the ♯/♭ toggle). */
    function defaultPrefersFlats() {
      const pc = rootPc();
      return mode === "major" ? MAJOR_USE_FLATS.has(pc) : MINOR_USE_FLATS.has(pc);
    }

    /** Spelling for scale name / note labels / key signature. */
    function displayPrefersFlats() {
      if (canEnharmonicSwitch()) return userPreferFlat;
      return defaultPrefersFlats();
    }

    function noteName(pc) {
      if (displayPrefersFlats()) {
        if (pc === 11) return "C♭";
        return NOTE_FLAT[pc];
      }
      return NOTE_SHARP[pc];
    }

    function keySignatureCount() {
      const pc = rootPc();
      if (mode === "major") {
        if (displayPrefersFlats() && MAJOR_FLAT_SIG[pc] != null) return MAJOR_FLAT_SIG[pc];
        return MAJOR_SIG[pc] ?? 0;
      }
      const rel = (pc + 3) % 12;
      if (displayPrefersFlats() && MAJOR_FLAT_SIG[rel] != null) return MAJOR_FLAT_SIG[rel];
      return MAJOR_SIG[rel] ?? 0;
    }

    function syncEnharmonicPreference() {
      if (canEnharmonicSwitch()) userPreferFlat = defaultPrefersFlats();
    }

    function updateEnharmonicButtons() {
      const on = canEnharmonicSwitch();
      btnSharp.disabled = !on;
      btnFlat.disabled = !on;
      if (!on) {
        btnSharp.setAttribute("aria-pressed", "false");
        btnFlat.setAttribute("aria-pressed", "false");
        return;
      }
      btnSharp.setAttribute("aria-pressed", String(!userPreferFlat));
      btnFlat.setAttribute("aria-pressed", String(userPreferFlat));
    }

    function formatKeySig(count) {
      if (count === 0) return "no key signature";
      if (count > 0) {
        return `${SHARP_ORDER.slice(0, count).join(" ")} · ${count} sharp${count > 1 ? "s" : ""}`;
      }
      const n = -count;
      return `${FLAT_ORDER.slice(0, n).join(" ")} · ${n} flat${n > 1 ? "s" : ""}`;
    }

    function absIndex(octave, pc) {
      return octave * 12 + pc;
    }

    function polar(cx, cy, r, deg) {
      const a = ((deg - 90) * Math.PI) / 180;
      return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
    }

    /** Annular sector path from angle a0→a1 (degrees), radii r0 (inner) → r1 (outer). */
    function annulusPath(cx, cy, r0, r1, a0, a1) {
      const large = a1 - a0 > 180 ? 1 : 0;
      const [x0, y0] = polar(cx, cy, r1, a0);
      const [x1, y1] = polar(cx, cy, r1, a1);
      const [x2, y2] = polar(cx, cy, r0, a1);
      const [x3, y3] = polar(cx, cy, r0, a0);
      return [
        `M ${x0} ${y0}`,
        `A ${r1} ${r1} 0 ${large} 1 ${x1} ${y1}`,
        `L ${x2} ${y2}`,
        `A ${r0} ${r0} 0 ${large} 0 ${x3} ${y3}`,
        "Z",
      ].join(" ");
    }

    function cofLabelText(className, i, x, y, label, fontSize) {
      if (label.includes("/")) {
        const [a, b] = label.split("/");
        // Prefer B / G♭ / D♭ slightly larger than their enharmonic pair below
        const large = fontSize + 2;
        const small = Math.max(9, fontSize - 1);
        return (
          `<text class="cof-label ${className}" data-i="${i}" x="${x}" y="${y}">` +
          `<tspan x="${x}" dy="-0.55em" font-size="${large}">${a}</tspan>` +
          `<tspan x="${x}" dy="1.2em" font-size="${small}">${b}</tspan>` +
          `</text>`
        );
      }
      return `<text class="cof-label ${className}" data-i="${i}" x="${x}" y="${y}" font-size="${fontSize}">${label}</text>`;
    }

    function buildCircleOfFifths() {
      const cx = 140;
      const cy = 140;
      const outerR1 = 132;
      const outerR0 = 88;
      const innerR1 = 86;
      const innerR0 = 48;
      const parts = [];

      for (let i = 0; i < 12; i++) {
        const mid = i * 30;
        const a0 = mid - 15;
        const a1 = mid + 15;
        const majorPc = COF_MAJOR_PC[i];
        const minorPc = (majorPc + 9) % 12;

        parts.push(
          `<path class="cof-seg cof-major" data-i="${i}" data-pc="${majorPc}" d="${annulusPath(cx, cy, outerR0, outerR1, a0, a1)}" />`
        );
        parts.push(
          `<path class="cof-seg cof-minor" data-i="${i}" data-pc="${minorPc}" d="${annulusPath(cx, cy, innerR0, innerR1, a0, a1)}" />`
        );

        const [mx, my] = polar(cx, cy, (outerR0 + outerR1) / 2, mid);
        const [nx, ny] = polar(cx, cy, (innerR0 + innerR1) / 2, mid);
        const majorLabel = COF_MAJOR_LABEL[i];
        const minorLabel = COF_MINOR_LABEL[i];
        const majorFs = majorLabel.includes("/") ? 12 : 14;
        const minorFs = minorLabel.length > 3 ? 12 : 14;
        parts.push(cofLabelText("cof-major-label", i, mx, my, majorLabel, majorFs));
        parts.push(cofLabelText("cof-minor-label", i, nx, ny, minorLabel, minorFs));
      }

      parts.push(`<circle cx="${cx}" cy="${cy}" r="${innerR0 - 1}" fill="#fff" stroke="#000" stroke-width="1" />`);

      circleSvg.innerHTML = parts.join("");
    }

    function updateCircleHighlight() {
      const root = rootPc();
      circleSvg.querySelectorAll(".cof-seg, .cof-label").forEach((el) => {
        el.classList.remove("active");
      });

      if (mode === "major") {
        const seg = circleSvg.querySelector(`.cof-major[data-pc="${root}"]`);
        const label = seg && circleSvg.querySelector(`.cof-major-label[data-i="${seg.dataset.i}"]`);
        if (seg) seg.classList.add("active");
        if (label) label.classList.add("active");
      } else {
        const seg = circleSvg.querySelector(`.cof-minor[data-pc="${root}"]`);
        const label = seg && circleSvg.querySelector(`.cof-minor-label[data-i="${seg.dataset.i}"]`);
        if (seg) seg.classList.add("active");
        if (label) label.classList.add("active");
      }
    }

    /** Letter index 0–6 for the tonic (C=0 … B=6). */
    function tonicLetterIndex(pc, useFlats) {
      const whiteIdx = WHITE_PC.indexOf(pc);
      if (whiteIdx !== -1) {
        // B sounding as C♭
        if (useFlats && pc === 11) return 0;
        return whiteIdx;
      }
      // Black key: ♯ → letter of white below; ♭ → letter of white above
      if (useFlats) return WHITE_PC.indexOf(pc + 1);
      return WHITE_PC.indexOf(pc - 1);
    }

    /** White-key abs for a letter, nearest to targetAbs (the C-major-style guide seat). */
    function guideAbsForLetter(letterIdx, targetAbs) {
      const guidePc = WHITE_PC[letterIdx];
      let guideAbs = Math.floor(targetAbs / 12) * 12 + guidePc;
      while (guideAbs - targetAbs > 6) guideAbs -= 12;
      while (targetAbs - guideAbs > 6) guideAbs += 12;
      return guideAbs;
    }

    function xAtAbs(abs) {
      const k = keyCenters.find((c) => c.abs === abs);
      return k ? k.x : null;
    }

    /**
     * Eight degrees: guide = white-key “C major shape” seat (geometry only),
     * letter = display spelling for labels. Grid geometry ignores the ♯/♭ toggle.
     */
    function gridDegrees() {
      const root = rootPc();
      const displayLetter0 = tonicLetterIndex(root, displayPrefersFlats());
      // Grid seats always follow default / F♯ geometry — not the spelling toggle
      let guideLetter0 = tonicLetterIndex(root, defaultPrefersFlats());
      if (mode === "major" && root === 6) {
        guideLetter0 = LETTERS.indexOf("F");
      }
      // G♯ minor / E♭ minor: use sharp-side seats so L-steps run rightward
      if (mode === "minor" && (root === 8 || root === 3)) {
        guideLetter0 = tonicLetterIndex(root, false);
      }
      const pattern = PATTERNS[mode];
      const degrees = pattern.map((off, i) => {
        const targetAbs = firstNote + off;
        const letterIdx = (displayLetter0 + (i === 7 ? 0 : i)) % 7;
        const guideLetterIdx = (guideLetter0 + (i === 7 ? 0 : i)) % 7;
        let guideAbs = guideAbsForLetter(guideLetterIdx, targetAbs);
        if (i === 0) guideAbs = targetAbs;
        if (i === 6 && mode === "major" && root === 6) {
          guideAbs = targetAbs;
        }
        // E♭ minor: C♭ sounds as B — straight line, not a C→B step
        if (i === 5 && mode === "minor" && root === 3) {
          guideAbs = targetAbs;
        }
        return {
          i,
          letter: LETTERS[letterIdx],
          targetAbs,
          guideAbs,
          stepped: guideAbs !== targetAbs,
        };
      });

      const targets = new Set(degrees.map((d) => d.targetAbs));
      return degrees.map((d) => ({
        ...d,
        guideOccupied: d.stepped && targets.has(d.guideAbs),
      }));
    }

    function degreeLabel(deg) {
      const targetPc = ((deg.targetAbs % 12) + 12) % 12;
      const guidePc = WHITE_PC[LETTERS.indexOf(deg.letter)];
      // C♭ / F♭ when letter is above a white-key sounding pitch
      if (deg.letter === "C" && targetPc === 11) return "C♭";
      if (deg.letter === "F" && targetPc === 4) return "F♭";
      if (targetPc === guidePc) return deg.letter;
      const diff = ((targetPc - guidePc + 12) % 12);
      if (diff === 1) return deg.letter + "♯";
      if (diff === 11) return deg.letter + "♭";
      return noteName(targetPc);
    }

    /** Absolute indices of the 8 sounding grid notes (first tonic … second tonic). */
    function activeAbsSet() {
      return new Set(PATTERNS[mode].map((off) => firstNote + off));
    }

    function isActiveKey(abs) {
      return activeAbsSet().has(abs);
    }

    function buildKeyboard() {
      keyboard.querySelectorAll(".white-key").forEach((el) => el.remove());
      blackKeysEl.innerHTML = "";

      for (let o = 0; o < OCTAVES; o++) {
        for (let w = 0; w < 7; w++) {
          const pc = WHITE_PC[w];
          const key = document.createElement("div");
          key.className = "white-key";
          key.dataset.pc = String(pc);
          key.dataset.octave = String(o);
          key.dataset.abs = String(absIndex(o, pc));
          keyboard.insertBefore(key, blackKeysEl);
        }
      }

      requestAnimationFrame(() => {
        layoutGeometry();
        render();
      });
    }

    function layoutGeometry() {
      blackKeysEl.innerHTML = "";
      keyCenters = [];

      const whiteEls = [...keyboard.querySelectorAll(".white-key")];
      const kbRect = keyboard.getBoundingClientRect();
      const whiteW = whiteEls[0].getBoundingClientRect().width;
      const blackW = whiteW * 0.58;
      blackKeysEl.style.setProperty("--bw", `${blackW}px`);

      whiteEls.forEach((el, i) => {
        const o = Math.floor(i / 7);
        const w = i % 7;
        const pc = WHITE_PC[w];
        const abs = absIndex(o, pc);
        const rect = el.getBoundingClientRect();
        const x = rect.left - kbRect.left + rect.width / 2;
        keyCenters.push({ pc, octave: o, abs, x, isBlack: false, el });
      });

      for (let o = 0; o < OCTAVES; o++) {
        for (const bk of BLACK_META) {
          const wi = o * 7 + bk.after;
          const whiteEl = whiteEls[wi];
          const nextEl = whiteEls[wi + 1];
          if (!whiteEl || !nextEl) continue;

          const seam = whiteEl.getBoundingClientRect().right - kbRect.left;
          const left = seam - blackW / 2;
          const abs = absIndex(o, bk.pc);

          const el = document.createElement("div");
          el.className = "black-key";
          el.style.left = `${left}px`;
          el.dataset.pc = String(bk.pc);
          el.dataset.octave = String(o);
          el.dataset.abs = String(abs);
          blackKeysEl.appendChild(el);

          keyCenters.push({
            pc: bk.pc,
            octave: o,
            abs,
            x: left + blackW / 2,
            isBlack: true,
            el,
          });
        }
      }

      keyCenters.sort((a, b) => a.abs - b.abs);

      const mid = keyCenters.filter((k) => k.octave === 1);
      if (mid.length >= 2) {
        let sum = 0;
        for (let i = 1; i < mid.length; i++) sum += mid[i].x - mid[i - 1].x;
        stepWidth = sum / (mid.length - 1);
      }

      const intoPx = GRID_INTO_CM * (96 / 2.54); // CSS cm ≈ 96dpi
      gridEl.style.height = `${GRID_ABOVE + intoPx}px`;
    }

    function render() {
      const root = rootPc();
      scaleNameEl.textContent = `${noteName(root)} ${mode}`;
      keySigEl.textContent = formatKeySig(keySignatureCount());
      updateEnharmonicButtons();

      keyboard.querySelectorAll(".white-key, .black-key").forEach((el) => {
        const abs = Number(el.dataset.abs);
        const active = isActiveKey(abs);
        el.classList.toggle("in-scale", active);
      });

      const degrees = gridDegrees();
      scaleLabelsEl.innerHTML = degrees
        .map((d, i) => {
          const x = xAtAbs(d.targetAbs);
          if (x == null) return "";
          const isTonic = i === 0 || i === degrees.length - 1;
          return `<span class="${isTonic ? "root-note" : ""}" style="left:${x}px">${degreeLabel(d)}</span>`;
        })
        .join("");

      drawGrid(degrees);
      updateCircleHighlight();
    }

    function drawGrid(degrees) {
      const w = keyboard.offsetWidth;
      const h = gridEl.offsetHeight;
      const topY = LABEL_H + 0.5;
      const bottomY = h - 0.5;
      const stepY = STEP_Y;

      gridSvg.setAttribute("viewBox", `0 0 ${w} ${h}`);
      gridSvg.setAttribute("width", String(w));
      gridSvg.setAttribute("height", String(h));

      const segs = [];
      const guideXs = [];
      const pattern = PATTERNS[mode];

      for (const d of degrees) {
        const xGuide = xAtAbs(d.guideAbs);
        const xTarget = xAtAbs(d.targetAbs);
        if (xGuide == null || xTarget == null) continue;
        guideXs.push(xGuide);

        if (!d.stepped) {
          segs.push(`<line x1="${xGuide}" y1="${topY}" x2="${xGuide}" y2="${bottomY}" />`);
        } else if (d.guideOccupied) {
          // Guide key is another degree’s sounding note (G♭: B is both B♭’s
          // seat and C♭). Jog along the top bar, vertical only on the target.
          segs.push(
            `<path d="M ${xGuide} ${topY} L ${xTarget} ${topY} L ${xTarget} ${bottomY}" />`
          );
        } else {
          segs.push(
            `<path d="M ${xGuide} ${topY} L ${xGuide} ${stepY} L ${xTarget} ${stepY} L ${xTarget} ${bottomY}" />`
          );
        }
      }

      if (guideXs.length === 0) {
        gridSvg.innerHTML = "";
        return;
      }

      const left = Math.min(...guideXs);
      const right = Math.max(...guideXs);
      const bar = `<line x1="${left}" y1="${topY}" x2="${right}" y2="${topY}" />`;

      // Whole / half step labels between consecutive guide seats
      const labels = [];
      for (let i = 0; i < guideXs.length - 1; i++) {
        const semitones = pattern[i + 1] - pattern[i];
        const label = semitones === 1 ? "half" : "whole";
        const mx = (guideXs[i] + guideXs[i + 1]) / 2;
        labels.push(
          `<text x="${mx}" y="${LABEL_H - 3}" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#000">${label}</text>`
        );
      }

      gridSvg.innerHTML = `
        <g stroke="#000" stroke-width="1.25" fill="none" stroke-linecap="square" stroke-linejoin="miter">
          ${bar}
          ${segs.join("")}
        </g>
        <g stroke="none" fill="#000">${labels.join("")}</g>
      `;
    }

    function clampFirst(n) {
      // Keep the full tonic→tonic span on the keyboard (octaves 2–4)
      return Math.max(ZONE_START, Math.min(ZONE_END - 12, n));
    }

    function shiftFirst(delta) {
      const next = clampFirst(firstNote + delta);
      if (next !== firstNote) {
        firstNote = next;
        syncEnharmonicPreference();
        render();
      }
    }

    function setMode(next) {
      mode = next;
      btnMajor.setAttribute("aria-pressed", String(mode === "major"));
      btnMinor.setAttribute("aria-pressed", String(mode === "minor"));
      syncEnharmonicPreference();
      render();
    }

    function setEnharmonicFlat(flat) {
      if (!canEnharmonicSwitch()) return;
      if (userPreferFlat === flat) return;
      userPreferFlat = flat;
      render();
    }

    btnMajor.addEventListener("click", () => setMode("major"));
    btnMinor.addEventListener("click", () => setMode("minor"));
    btnSharp.addEventListener("click", () => setEnharmonicFlat(false));
    btnFlat.addEventListener("click", () => setEnharmonicFlat(true));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") {
        e.preventDefault();
        shiftFirst(-1);
      } else if (e.key === "ArrowRight") {
        e.preventDefault();
        shiftFirst(1);
      } else if (e.key === "m" || e.key === "M") {
        setMode(mode === "major" ? "minor" : "major");
      }
    });

    let dragging = false;
    let originX = 0;
    let originFirst = 0;

    function onPointerDown(e) {
      dragging = true;
      originX = e.clientX;
      originFirst = firstNote;
      pianoWrap.setPointerCapture(e.pointerId);
    }

    function onPointerMove(e) {
      if (!dragging) return;
      const semitones = Math.round((e.clientX - originX) / stepWidth);
      const next = clampFirst(originFirst + semitones);
      if (next !== firstNote) {
        firstNote = next;
        syncEnharmonicPreference();
        render();
      }
    }

    function onPointerUp(e) {
      dragging = false;
      try { pianoWrap.releasePointerCapture(e.pointerId); } catch (_) {}
    }

    pianoWrap.addEventListener("pointerdown", onPointerDown);
    pianoWrap.addEventListener("pointermove", onPointerMove);
    pianoWrap.addEventListener("pointerup", onPointerUp);
    pianoWrap.addEventListener("pointercancel", onPointerUp);

    window.addEventListener("resize", () => {
      layoutGeometry();
      render();
    });

    buildCircleOfFifths();
    buildKeyboard();
  </script>
</body>
</html>
